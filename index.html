<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">Welcome to Your Dashboard</h1>
            <p class="text-gray-500 mt-2">Let's personalize your experience.</p>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Enter Your Details</h2>
            <form id="userForm" class="space-y-4">
                <div>
                    <label for="userName" class="block text-sm font-medium text-gray-600 mb-1">Your Name</label>
                    <input type="text" id="userName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Enter your name">
                </div>
                <div>
                    <label for="userAge" class="block text-sm font-medium text-gray-600 mb-1">Your Age (Years)</label>
                    <input type="number" id="userAge" required min="1" max="120" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Enter your age">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition dynamic-shadow shadow-md">
                    Save & Generate Experience
                </button>
            </form>
        </section>

        <section id="outputSection" class="hidden space-y-6 animate-fade-in">
            
            <div class="bg-indigo-50 border border-indigo-100 p-6 rounded-2xl">
                <h2 id="greetingText" class="text-2xl font-bold text-indigo-900 mb-2"></h2>
                <p id="ageInMonthsText" class="text-indigo-700 font-medium"></p>
            </div>

            <div id="ageStatusCard" class="p-6 rounded-2xl border transition">
                <p id="ageStatusText" class="font-semibold text-lg"></p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold text-gray-700 mb-4">Your Daily Motivation</h3>
                <div id="quoteContainer" class="space-y-3">
                    <p id="quoteText" class="text-gray-600 italic"></p>
                </div>
            </div>

            <div class="text-center pt-4">
                <button id="clearBtn" class="text-sm text-red-500 hover:text-red-700 font-medium underline cursor-pointer">
                    Clear stored data and reset
                </button>
            </div>
        </section>
    </main>

    <footer class="text-center py-6 border-t border-gray-200 text-sm text-gray-400">
        Personalized Webpage Project &copy; 2026
    </footer>

    <script src="script.js"></script>
</body>
</html>
